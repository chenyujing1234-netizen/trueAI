# Smithery (https://smithery.ai) — server manifest for a remote MCP server.
# When this repo is connected to Smithery, the server is listed publicly at:
#   https://smithery.ai/server/@chenyujing1234-netizen/trueai

startCommand:
  type: http

# Production endpoint — Streamable HTTP transport (modern MCP),
# mounted on the TrueAI backend. SSE legacy endpoint also available at
# https://www.shiflowai.cloud/mcp-sse/sse for older clients.
remote:
  url: "https://www.shiflowai.cloud/mcp"

# Human-facing metadata
name:        "TrueAI"
description: |
  Find the right AI SaaS app for any task using the TrueAI catalog
  (1,600+ curated apps with categories, sub-scores, pricing and real
  user reviews). Recommend by natural-language need, look up an app by
  name / slug / URL, browse by category, or attach real user reviews.
homepage:    "https://www.shiflowai.cloud"
icon:        "https://www.shiflowai.cloud/favicon.ico"
license:     "MIT"

tags:
  - ai-tools
  - ai-discovery
  - recommendation
  - saas
  - catalog
  - directory

# Tools exposed by this MCP server
exampleConfig: {}
